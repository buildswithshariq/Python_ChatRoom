{% extends "base.html" %}
{% block title %}Login - ChatBox{% endblock %}

{% block head %}
<style>
    .auth-container {
        max-width: 420px;
        margin: 60px auto;
        padding: 0 20px;
    }
    .auth-card {
        background: #fff;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .auth-card h2 {
        margin: 0 0 8px;
        text-align: center;
        color: #1a1a2e;
    }
    .auth-card .subtitle {
        text-align: center;
        color: #777;
        margin-bottom: 28px;
    }
    .form-group {
        margin-bottom: 18px;
    }
    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #333;
        font-size: 0.9rem;
    }
    .form-group input {
        width: 100%;
        padding: 12px 14px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        transition: border-color 0.2s;
        box-sizing: border-box;
    }
    .form-group input:focus {
        outline: none;
        border-color: #4361ee;
        box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
    }
    .btn-submit {
        width: 100%;
        padding: 14px;
        background: #4361ee;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 1.05rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
    }
    .btn-submit:hover {
        background: #3a56d4;
    }
    .error-msg {
        background: #fee2e2;
        color: #991b1b;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 0.9rem;
        display: none;
    }
    .auth-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
    }
    .auth-link a {
        color: #4361ee;
        font-weight: 600;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your ChatBox account</p>
        <div class="error-msg" id="error-msg"></div>
        <form
            method="POST"
            action="/auth/login"
            id="login-form"
        >
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="/auth/register">Register</a></p>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
        const el = document.getElementById('error-msg');
        el.textContent = params.get('error');
        el.style.display = 'block';
    }
</script>
{% endblock %}
